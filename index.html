<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Platformer Builder (Extra Sloped) 🛠️</title>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; background: #121212; color: white; }
        #panel { width: 500px; background: #1a1a1a; padding: 20px; border-right: 2px solid #ffea00; overflow-y: auto; }
        .card { background: #252525; padding: 10px; margin-bottom: 10px; border-left: 4px solid #ffea00; }
        input { width: 90%; padding: 8px; margin: 5px 0; }
        .btn-copy { background: #ffea00; color: black; padding: 15px; width: 100%; border: none; cursor: pointer; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<div id="panel">
    <h2>Quest Settings 🛠️</h2>
    Lives: <input type="number" id="lives-count" value="3" min="1" max="10" oninput="draw()"><br>
    Time (min): <input type="number" id="time-limit" value="5" min="0" oninput="draw()"><br>
    Timer Color: <input type="color" id="timer-col" value="#ff0000" onchange="draw()"><br>
    Victory Text: <input type="text" id="win-text" value="Well done!" oninput="draw()"><br>
    Win Panel Bg: <input type="color" id="win-bg" value="#000000" onchange="draw()"><br>
    Win Panel Border: <input type="color" id="win-border" value="#ffffff" onchange="draw()"><br>
    Win Text Color: <input type="color" id="win-col" value="#ffd700" onchange="draw()"><br>
    Char Size: <input type="range" id="p-size" min="20" max="60" value="40" oninput="draw()"><br>
    Text Color: <input type="color" id="txt-col" value="#ffffff" onchange="draw()"><br>
    Task Panel Color: <input type="color" id="m-col" value="#000000" onchange="draw()"><br>
    Buttons Color: <input type="color" id="btn-col" value="#444444" onchange="draw()"><br>
    Platforms Color: <input type="color" id="p-col" value="#4caf50" onchange="draw()"><br>
    Char URL: <input type="text" id="p-url" value="https://cdn-icons-png.flaticon.com/128/1997/1997576.png" oninput="draw()"><br>
    <div id="q-list"></div>
    <button class="btn-copy" onclick="copyCode()">COPY CODE FOR GENIALLY</button>
</div>

<div id="view" style="flex-grow:1; display:flex; justify-content:center; align-items:center;">
    <div id="preview-frame" style="background:#87ceeb; width:400px; height:500px;"></div>
</div>

<script>
    let tasks = Array.from({length: 10}, (_, i) => ({q: "Question "+(i+1), right: "True", wrong: "False"}));
    
    function renderEditor() {
        const c = document.getElementById('q-list'); c.innerHTML = '<h3>Questions:</h3>';
        tasks.forEach((val, i) => {
            const d = document.createElement('div'); d.className = 'card';
            d.innerHTML = `Q${i+1}: <input type="text" value="${val.q}" oninput="tasks[${i}].q=this.value;draw()"><br>
                Correct: <input type="text" value="${val.right}" oninput="tasks[${i}].right=this.value;draw()"><br>
                Wrong: <input type="text" value="${val.wrong}" oninput="tasks[${i}].wrong=this.value;draw()">`;
            c.appendChild(d);
        });
    }

    function getCode() {
        const pUrl = document.getElementById('p-url').value, pCol = document.getElementById('p-col').value;
        const txtCol = document.getElementById('txt-col').value, btnCol = document.getElementById('btn-col').value;
        const winCol = document.getElementById('win-col').value, pSize = document.getElementById('p-size').value;
        const mCol = document.getElementById('m-col').value, winBorder = document.getElementById('win-border').value;
        const winText = document.getElementById('win-text').value, timerCol = document.getElementById('timer-col').value;
        const winBg = document.getElementById('win-bg').value;
        const livesCount = document.getElementById('lives-count').value, timeLimit = document.getElementById('time-limit').value * 60;
        const data = JSON.stringify(tasks);
        
        return `<iframe srcdoc='<!DOCTYPE html><html><body style="margin:0;overflow:hidden;background:transparent;font-family:sans-serif">
            <div id="g" style="position:relative;width:400px;height:500px">
                <div id="p" style="position:absolute;top:20px;left:350px;width:${pSize}px;height:${pSize}px;background:url(${pUrl}) no-repeat center/contain;transition:0.5s ease-out;z-index:10"></div>
                <div id="info-panel" style="position:absolute;top:5px;left:10px;display:flex;flex-direction:column;gap:5px;z-index:100;">
                    <div id="clock" style="font-size:20px;color:${timerCol};font-weight:bold;background:rgba(255,255,255,0.7);padding:2px 8px;border-radius:10px;border:1px solid ${timerCol}">🕒 <span id="time-val">00:00</span></div>
                    <div id="l" style="font-size:24px;text-align:left;"></div>
                </div>
            </div>
            <div id="msg-box" style="display:none; position:absolute; top:100px; left:50px; width:300px; padding:20px; border:2px solid ${winBorder}; background:${winBg}; color:${winCol}; font-size:24px; font-weight:bold; text-align:center; border-radius:15px; z-index:100;">${winText}</div>
            <div id="m" style="position:absolute;bottom:0px;right:0px;width:200px;height:180px;background:${mCol};opacity:0.9;padding:10px;text-align:center;color:${txtCol};z-index:50">
                <h3 id="q" style="margin:5px 0; font-size:14px;"></h3>
                <button id="b1" onclick="check(true)" style="display:block;width:100%;margin-bottom:5px;cursor:pointer;background:${btnCol};color:${txtCol};border:none;padding:8px"></button>
                <button id="b2" onclick="check(false)" style="display:block;width:100%;cursor:pointer;background:${btnCol};color:${txtCol};border:none;padding:8px"></button>
            </div>
            <script>
                const tasks=${data}, p=document.getElementById("p"), q=document.getElementById("q"), b1=document.getElementById("b1"), b2=document.getElementById("b2"), lDiv=document.getElementById("l"), tVal=document.getElementById("time-val");
                let lvl=0, lives=${livesCount}, timeLeft=${timeLimit}, interval;
                
                function updateClock() {
                    let m = Math.floor(timeLeft / 60);
                    let s = timeLeft % 60;
                    tVal.innerText = (m < 10 ? "0"+m : m) + ":" + (s < 10 ? "0"+s : s);
                    if (timeLeft > 0) timeLeft--;
                    else { clearInterval(interval); location.reload(); }
                }
                if(${timeLimit} > 0) { updateClock(); interval = setInterval(updateClock, 1000); }

                const pSize = ${pSize}, platHeight = 10;
                const platformData = [];
                tasks.forEach((_,i)=>{
                    const d=document.createElement("div");
                    // Теперь еще более пологая лестница
                    const topPos = 100 + (i * 30), leftPos = 350 - (i * 36);
                    platformData.push({x: leftPos, y: topPos});
                    d.style="position:absolute;width:50px;height:"+platHeight+"px;background:${pCol};left:"+leftPos+"px;top:"+topPos+"px;border-radius:5px";
                    document.getElementById("g").appendChild(d);
                });

                function updateHearts(){ lDiv.innerText="❤️".repeat(lives); }
                updateHearts();
                function show(){ 
                    q.innerText=tasks[lvl].q; const c=Math.random()>0.5;
                    b1.innerText=c?tasks[lvl].right:tasks[lvl].wrong; b2.innerText=c?tasks[lvl].wrong:tasks[lvl].right;
                    b1.dataset.r=c; b2.dataset.r=!c;
                }
                function check(c){
                    const r = c?(b1.dataset.r==="true"):(b2.dataset.r==="true");
                    if(r){ 
                        p.style.top = (platformData[lvl].y - pSize) + "px";
                        p.style.left = (platformData[lvl].x + 5) + "px";
                        lvl++; 
                        if(lvl>=tasks.length) { document.getElementById("msg-box").style.display="block"; clearInterval(interval); } else show(); 
                    } else { 
                        lives--; updateHearts();
                        if(lives<=0){ location.reload(); } else { p.style.top="20px"; p.style.left="350px"; lvl=0; show(); }
                    }
                }
                show();
            <\/script></body></html>' width="400" height="500" frameborder="0" allowtransparency="true"></iframe>`;
    }

    function draw() { document.getElementById('preview-frame').innerHTML = getCode(); }
    function copyCode() { navigator.clipboard.writeText(getCode()); alert("Code copied!"); }
    renderEditor(); draw();
</script>
</body>
</html>
