<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body style="margin:0; padding:0; background: #87ceeb; overflow:hidden;">

<div id="game-container" style="width:400px; height:500px; position:relative;">
    <div id="timer" style="position:absolute; top:10px; left:10px; font-size:24px; font-weight:bold; color:red; background:white; padding:5px; border-radius:5px;">5:00</div>
    
    <div id="player" style="position:absolute; top:20px; left:350px; width:40px; height:40px; background:red; transition:0.5s;"></div>
    
    <div id="platforms"></div>

    <div id="menu" style="position:absolute; bottom:0; width:100%; height:150px; background:black; color:white; text-align:center;">
        <p id="question">Вопрос 1?</p>
        <button onclick="check(true)">ПРАВИЛЬНО</button>
        <button onclick="check(false)">НЕПРАВИЛЬНО</button>
    </div>
</div>

<script>
    let lvl = 0;
    let time = 300;
    const player = document.getElementById('player');
    const timerDisplay = document.getElementById('timer');
    
    // Платформы
    const platformCoords = [
        {x: 280, y: 120},
        {x: 240, y: 165},
        {x: 200, y: 210}
    ];

    // Отрисовка платформ
    platformCoords.forEach(p => {
        const div = document.createElement('div');
        div.style.position = 'absolute';
        div.style.left = p.x + 'px';
        div.style.top = p.y + 'px';
        div.style.width = '50px';
        div.style.height = '10px';
        div.style.background = 'green';
        document.getElementById('platforms').appendChild(div);
    });

    // Таймер
    setInterval(() => {
        time--;
        let m = Math.floor(time / 60);
        let s = time % 60;
        timerDisplay.innerText = m + ":" + (s < 10 ? "0" + s : s);
    }, 1000);

    // Логика движения
    function check(isCorrect) {
        if (isCorrect && lvl < platformCoords.length) {
            player.style.left = (platformCoords[lvl].x + 5) + 'px';
            player.style.top = (platformCoords[lvl].y - 40) + 'px';
            lvl++;
        } else {
            player.style.top = '20px';
            player.style.left = '350px';
            lvl = 0;
        }
    }
</script>

</body>
</html>
